<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>周末去哪儿 · WEEKEND GUIDE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
    background: #F5F0EB;
    width: 900px; min-height: 1200px;
    margin: 0 auto;
  }

  .poster {
    width: 900px; min-height: 1200px;
    background: linear-gradient(180deg, #FBF9F6 0%, #F5EFE9 40%, #EFE8E0 100%);
    position: relative; overflow: hidden;
    padding: 0;
  }

  /* ── Background texture ── */
  .poster::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 60% 30%, rgba(194,103,74,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 400px 500px at 20% 70%, rgba(184,138,92,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 300px 300px at 75% 85%, rgba(194,103,74,0.03) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ── Top accent line ── */
  .top-line {
    width: 840px; height: 1px;
    background: linear-gradient(90deg, transparent, #C2674A 30%, #C2674A 70%, transparent);
    margin: 40px auto 0;
    position: relative; z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 50px 60px 36px;
    position: relative; z-index: 1;
  }
  .header-rule {
    display: inline-block;
    font-family: "Noto Sans SC", sans-serif;
    font-size: 11px;
    color: #C2674A;
    letter-spacing: 8px;
    font-weight: 500;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(194,103,74,0.3);
    margin-bottom: 28px;
  }
  .header-title {
    font-size: 82px;
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1.05;
    color: #2C2416;
    margin-bottom: 12px;
  }
  .header-sub {
    font-family: "Noto Sans SC", sans-serif;
    font-size: 14px;
    letter-spacing: 10px;
    color: #9E9688;
    font-weight: 300;
    margin-bottom: 20px;
  }
  .header-slogan {
    font-family: "Noto Sans SC", sans-serif;
    font-size: 15px;
    color: #8A8070;
    font-weight: 300;
    letter-spacing: 2px;
    line-height: 1.7;
  }
  .header-divider {
    width: 40px; height: 1.5px;
    background: #C2674A;
    margin: 22px auto 0;
  }

  /* ── Screenshot cluster ── */
  .shots-area {
    position: relative; z-index: 1;
    margin: 40px 30px 60px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
  }

  .shot-wrapper {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(44,36,22,0.10), 0 1px 0 rgba(44,36,22,0.05);
    background: #FFFFFF;
    transition: transform 0.3s;
  }
  .shot-wrapper img {
    display: block;
    object-fit: cover;
    object-position: top;
  }

  /* Large center — 列表页 */
  .shot-lg {
    width: 260px; height: 380px;
    z-index: 3;
    border-radius: 20px;
    margin: 0 4px;
  }
  .shot-lg img { width: 260px; height: 380px; }

  /* Medium — 添加页, 地图页 */
  .shot-md {
    width: 210px; height: 320px;
    z-index: 2;
    border-radius: 16px;
    margin: 20px 4px 0;
  }
  .shot-md img { width: 210px; height: 320px; }

  /* Small — 启动页, 我的页 */
  .shot-sm {
    width: 175px; height: 260px;
    z-index: 1;
    border-radius: 14px;
    margin: 40px 2px 0;
  }
  .shot-sm img { width: 175px; height: 260px; }

  /* Portrait phone — 启动页 */
  .shot-tall {
    width: 155px; height: 290px;
    z-index: 1;
    border-radius: 14px;
    margin: 10px 4px 0;
  }
  .shot-tall img { width: 155px; height: 290px; }

  /* ── Bottom label area ── */
  .bottom-area {
    text-align: center;
    padding: 0 60px 48px;
    position: relative; z-index: 1;
  }
  .bottom-line {
    width: 60px; height: 1px;
    background: rgba(194,103,74,0.4);
    margin: 0 auto 20px;
  }
  .bottom-text {
    font-family: "Noto Sans SC", sans-serif;
    font-size: 12px;
    color: #B5A99A;
    letter-spacing: 4px;
    line-height: 1.8;
  }

  /* ── Subtle dot decoration ── */
  .dot {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(194,103,74,0.25);
    pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>

<div class="poster">

  <!-- Background dots -->
  <div class="dot" style="top:180px; left:60px;"></div>
  <div class="dot" style="top:185px; left:70px;"></div>
  <div class="dot" style="top:185px; left:60px; width:3px; height:3px; opacity:0.4;"></div>

  <div class="top-line"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-rule">WEEKEND · WHERE</div>
    <div class="header-title">周末去哪儿</div>
    <div class="header-sub">WEEKEND GUIDE</div>
    <div class="header-slogan">收藏美食与游玩地<br>告别周末选择困难症</div>
    <div class="header-divider"></div>
  </div>

  <!-- Screenshots — staggered editorial layout -->
  <div class="shots-area">
    <!-- Left: 启动页 (tall) -->
    <div class="shot-wrapper shot-tall">
      <img src="启动页.jpg" alt="启动页">
    </div>

    <!-- Center-left: 地图页 -->
    <div class="shot-wrapper shot-md">
      <img src="地图页.jpg" alt="地图页">
    </div>

    <!-- Center: 列表页 (largest) -->
    <div class="shot-wrapper shot-lg">
      <img src="列表页.jpg" alt="列表页">
    </div>

    <!-- Center-right: 添加页 -->
    <div class="shot-wrapper shot-md">
      <img src="添加页.jpg" alt="添加页">
    </div>

    <!-- Right: 我的页 -->
    <div class="shot-wrapper shot-sm">
      <img src="我的页.jpg" alt="我的页">
    </div>
  </div>

  <!-- Footer -->
  <div class="bottom-area">
    <div class="bottom-line"></div>
    <div class="bottom-text">
      微信小程序 · 周末去哪儿<br>
      扫码探索你的下一个周末目的地
    </div>
  </div>

</div>

</body>
</html>
